<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard Aktivitas</title>
<style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; font-size: 16px; -webkit-tap-highlight-color: transparent; }
body { background: #0f0f1a; color: #e0e0e0; min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, textarea { font-family: inherit; font-size: 1rem; outline: none; }

/* === TOAST === */
#toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; background: #2a2a3e; color: #e0e0e0; padding: 12px 24px; border-radius: 12px; font-size: 0.9rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; max-width: 90vw; text-align: center; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { background: #3e1a1a; border-left: 4px solid #e74c3c; }
#toast.success { background: #1a3e1a; border-left: 4px solid #2ecc71; }

/* === HEADER === */
.app-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px 20px 16px; text-align: center; border-bottom: 1px solid #2a2a3e; }
.app-header h1 { font-size: 1.3rem; color: #4ecdc4; font-weight: 700; letter-spacing: 0.5px; }
.app-header h1 span { color: #f39c12; }

/* === GREETING === */
#greeting { padding: 16px 20px 8px; font-size: 1.1rem; font-weight: 600; color: #f0f0f0; }
#greeting small { font-size: 0.85rem; color: #888; font-weight: 400; margin-left: 8px; }

/* === PAGE CONTENT === */
.page { display: none; animation: fadeIn 0.25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* === BOTTOM TABS === */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; border-top: 1px solid #2a2a3e; display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
.tab-btn { flex: 1; padding: 10px 0 8px; background: none; color: #666; font-size: 0.75rem; text-align: center; transition: color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tab-btn .tab-icon { font-size: 1.3rem; }
.tab-btn.active { color: #4ecdc4; }
.tab-btn:active { opacity: 0.7; }

/* === ACTIVITY LIST === */
.activity-list { padding: 8px 16px 16px; }
.activity-card { background: #1a1a2e; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #2a2a3e; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
.activity-card:active { transform: scale(0.98); }
.activity-card .card-time { font-size: 0.8rem; color: #4ecdc4; font-weight: 600; margin-bottom: 4px; }
.activity-card .card-title { font-size: 1rem; font-weight: 600; color: #f0f0f0; margin-bottom: 2px; }
.activity-card .card-note { font-size: 0.85rem; color: #999; line-height: 1.4; }
.activity-card .card-badge { display: inline-block; font-size: 0.7rem; padding: 2px 10px; border-radius: 20px; font-weight: 600; margin-top: 6px; }
.badge-pending { background: #2a3a4e; color: #74b9ff; }
.badge-completed { background: #1a3e2a; color: #2ecc71; }
.badge-cancelled { background: #3e1a1a; color: #e74c3c; }
.activity-card .card-status-toggle { position: absolute; top: 12px; right: 12px; background: none; font-size: 1.2rem; padding: 4px; }

/* === EMPTY STATE === */
.empty-state { text-align: center; padding: 40px 20px; color: #555; }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.95rem; }

/* === WEEK VIEW === */
.week-day { margin-bottom: 16px; }
.week-day .day-header { font-size: 0.85rem; font-weight: 700; color: #4ecdc4; padding: 8px 16px 4px; display: flex; align-items: center; gap: 8px; }
.week-day .day-header .day-count { background: #2a2a3e; color: #888; font-size: 0.7rem; padding: 1px 8px; border-radius: 10px; }
.week-day.today .day-header { color: #f39c12; }
.week-day.today .day-header .day-count { background: #3e2a1a; color: #f39c12; }

/* === ADD FORM === */
.form-container { padding: 16px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 6px; font-weight: 600; }
.form-group input, .form-group textarea { width: 100%; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 12px 14px; color: #e0e0e0; font-size: 1rem; transition: border-color 0.2s; }
.form-group input:focus, .form-group textarea:focus { border-color: #4ecdc4; }
.form-group textarea { resize: vertical; min-height: 80px; }
.btn-primary { width: 100%; background: #4ecdc4; color: #0f0f1a; font-size: 1rem; font-weight: 700; padding: 14px; border-radius: 12px; transition: opacity 0.2s; }
.btn-primary:active { opacity: 0.8; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* === MODAL === */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-content { background: #1a1a2e; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; padding: 20px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-header h3 { font-size: 1.1rem; color: #f0f0f0; }
.modal-close { background: none; font-size: 1.5rem; color: #666; padding: 4px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn-save { flex: 1; background: #4ecdc4; color: #0f0f1a; font-weight: 700; padding: 12px; border-radius: 10px; font-size: 0.95rem; }
.modal-actions .btn-delete { background: #e74c3c; color: #fff; font-weight: 700; padding: 12px 20px; border-radius: 10px; font-size: 0.95rem; }
.modal-actions .btn-cancel { background: #2a2a3e; color: #888; padding: 12px 20px; border-radius: 10px; font-size: 0.95rem; }

/* === STATUS SELECT === */
.status-select { display: flex; gap: 8px; margin-top: 8px; }
.status-option { flex: 1; padding: 8px; border-radius: 8px; text-align: center; font-size: 0.85rem; font-weight: 600; background: #2a2a3e; color: #888; border: 2px solid transparent; transition: all 0.2s; }
.status-option.selected-pending { border-color: #74b9ff; color: #74b9ff; background: #2a3a4e; }
.status-option.selected-completed { border-color: #2ecc71; color: #2ecc71; background: #1a3e2a; }
.status-option.selected-cancelled { border-color: #e74c3c; color: #e74c3c; background: #3e1a1a; }

/* === RESPONSIVE === */
@media (min-width: 600px) {
  body { max-width: 480px; margin: 0 auto; border-left: 1px solid #2a2a3e; border-right: 1px solid #2a2a3e; min-height: 100vh; }
  .tab-bar { max-width: 480px; left: 50%; transform: translateX(-50%); }
  .modal-content { border-radius: 20px; margin: auto; }
  .modal-overlay { align-items: center; }
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #0f0f1a; }
::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- HEADER -->
<header class="app-header">
  <h1>📋 <span>Aktivitas</span> Harian</h1>
</header>

<!-- GREETING -->
<div id="greeting"></div>

<!-- PAGE: HARI INI -->
<div id="page-today" class="page active">
  <div id="today-count" style="padding: 4px 20px 0; font-size: 0.85rem; color: #888;"></div>
  <div id="today-list" class="activity-list"></div>
</div>

<!-- PAGE: MINGGU INI -->
<div id="page-week" class="page">
  <div id="week-list" class="activity-list"></div>
</div>

<!-- PAGE: TAMBAH -->
<div id="page-add" class="page">
  <div class="form-container">
    <form id="add-form" autocomplete="off">
      <div class="form-group">
        <label for="add-date">Tanggal</label>
        <input type="date" id="add-date" required>
      </div>
      <div class="form-group">
        <label for="add-time">Waktu</label>
        <input type="time" id="add-time" required>
      </div>
      <div class="form-group">
        <label for="add-title">Judul Kegiatan</label>
        <input type="text" id="add-title" placeholder="Contoh: Meeting dengan tim" required>
      </div>
      <div class="form-group">
        <label for="add-note">Catatan (opsional)</label>
        <textarea id="add-note" placeholder="Detail kegiatan..."></textarea>
      </div>
      <button type="submit" class="btn-primary" id="btn-add">➕ Tambah Aktivitas</button>
    </form>
  </div>
</div>

<!-- BOTTOM TABS -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="today">
    <span class="tab-icon">📋</span> Hari Ini
  </button>
  <button class="tab-btn" data-tab="week">
    <span class="tab-icon">📅</span> Minggu Ini
  </button>
  <button class="tab-btn" data-tab="add">
    <span class="tab-icon">➕</span> Tambah
  </button>
</nav>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title">Edit Aktivitas</h3>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <form id="edit-form" autocomplete="off">
      <div class="form-group">
        <label for="edit-date">Tanggal</label>
        <input type="date" id="edit-date" required>
      </div>
      <div class="form-group">
        <label for="edit-time">Waktu</label>
        <input type="time" id="edit-time" required>
      </div>
      <div class="form-group">
        <label for="edit-title">Judul</label>
        <input type="text" id="edit-title" required>
      </div>
      <div class="form-group">
        <label for="edit-note">Catatan</label>
        <textarea id="edit-note"></textarea>
      </div>
      <div class="form-group">
        <label>Status</label>
        <div class="status-select" id="edit-status-select">
          <button type="button" class="status-option" data-status="pending">⏳ Pending</button>
          <button type="button" class="status-option" data-status="completed">✅ Selesai</button>
          <button type="button" class="status-option" data-status="cancelled">❌ Batal</button>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="modal-cancel-btn">Batal</button>
        <button type="button" class="btn-delete" id="modal-delete-btn">🗑 Hapus</button>
        <button type="submit" class="btn-save">💾 Simpan</button>
      </div>
    </form>
  </div>
</div>

<script>
// === STATE ===
let activities = [];
let editingId = null;
let currentStatus = 'pending';

const API = '';

// === TOAST ===
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 2500);
}

// === FORMAT HELPERS ===
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const ds = dateStr;
  const ts = today.toISOString().slice(0,10);
  const tms = tomorrow.toISOString().slice(0,10);
  const ys = yesterday.toISOString().slice(0,10);
  if (ds === ts) return 'Hari Ini';
  if (ds === tms) return 'Besok';
  if (ds === ys) return 'Kemarin';
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()];
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return '☀️ Selamat pagi, Kak!';
  if (h < 15) return '🌤 Selamat siang, Kak!';
  if (h < 18) return '🌅 Selamat sore, Kak!';
  return '🌙 Selamat malam, Kak!';
}

function getStatusBadge(status) {
  const map = { pending: '⏳ Pending', completed: '✅ Selesai', cancelled: '❌ Batal' };
  return `<span class="card-badge badge-${status}">${map[status] || status}</span>`;
}

// === API CALLS ===
async function api(method, path, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request gagal');
  return data;
}

async function loadToday() {
  try {
    activities = await api('GET', '/api/today');
    renderToday();
  } catch (e) {
    showToast('Gagal memuat data: ' + e.message, 'error');
  }
}

async function loadWeek() {
  try {
    const data = await api('GET', '/api/week');
    renderWeek(data);
  } catch (e) {
    showToast('Gagal memuat data mingguan', 'error');
  }
}

async function loadActivities(filter = '') {
  try {
    const data = await api('GET', '/api/activities' + filter);
    activities = data;
    renderToday();
  } catch (e) {
    showToast('Gagal memuat data', 'error');
  }
}

// === RENDER: TODAY ===
function renderToday() {
  const list = document.getElementById('today-list');
  const countEl = document.getElementById('today-count');
  const greetingEl = document.getElementById('greeting');

  greetingEl.innerHTML = getGreeting() + ' <small>' + new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) + '</small>';

  if (activities.length === 0) {
    countEl.textContent = 'Belum ada aktivitas hari ini';
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Belum ada kegiatan hari ini.<br>Yuk tambah aktivitas baru!</p></div>';
    return;
  }

  countEl.textContent = '📌 ' + activities.length + ' aktivitas hari ini';
  list.innerHTML = activities.map(a => renderCard(a)).join('');
}

function renderCard(a) {
  return `<div class="activity-card" data-id="${a.id}" onclick="openEdit('${a.id}')">
    <div class="card-time">🕐 ${a.time}</div>
    <div class="card-title">${escHtml(a.title)}</div>
    ${a.note ? '<div class="card-note">' + escHtml(a.note) + '</div>' : ''}
    <div>${getStatusBadge(a.status)}</div>
  </div>`;
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// === RENDER: WEEK ===
function renderWeek(data) {
  const container = document.getElementById('week-list');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>Belum ada aktivitas minggu ini.</p></div>';
    return;
  }

  const grouped = {};
  data.forEach(a => {
    if (!grouped[a.date]) grouped[a.date] = [];
    grouped[a.date].push(a);
  });

  const today = new Date().toISOString().slice(0, 10);
  const sortedDates = Object.keys(grouped).sort();

  let html = '';
  sortedDates.forEach(date => {
    const isToday = date === today;
    const items = grouped[date];
    html += `<div class="week-day${isToday ? ' today' : ''}">
      <div class="day-header">${formatDate(date)} <span class="day-count">${items.length}</span></div>`;
    items.sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));
    items.forEach(a => {
      html += renderCard(a);
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

// === TABS ===
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('page-' + tab).classList.add('active');
    if (tab === 'today') loadToday();
    if (tab === 'week') loadWeek();
    if (tab === 'add') {
      const d = new Date();
      document.getElementById('add-date').value = d.toISOString().slice(0,10);
      document.getElementById('add-time').value = d.toTimeString().slice(0,5);
    }
  });
});

// === ADD FORM ===
document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  const data = {
    date: document.getElementById('add-date').value,
    time: document.getElementById('add-time').value,
    title: document.getElementById('add-title').value.trim(),
    note: document.getElementById('add-note').value.trim()
  };
  try {
    await api('POST', '/api/activities', data);
    showToast('✅ Aktivitas berhasil ditambahkan!');
    document.getElementById('add-form').reset();
    // Switch to today tab
    document.querySelector('[data-tab="today"]').click();
    loadToday();
  } catch (e) {
    showToast('Gagal menambah: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
});

// === EDIT MODAL ===
async function openEdit(id) {
  try {
    const a = await api('GET', '/api/activities/' + id);
    editingId = id;
    currentStatus = a.status;
    document.getElementById('edit-date').value = a.date;
    document.getElementById('edit-time').value = a.time;
    document.getElementById('edit-title').value = a.title;
    document.getElementById('edit-note').value = a.note || '';
    document.querySelectorAll('.status-option').forEach(el => {
      const s = el.dataset.status;
      el.className = 'status-option' + (s === currentStatus ? ' selected-' + s : '');
    });
    document.getElementById('edit-modal').classList.add('show');
  } catch (e) {
    showToast('Gagal memuat data', 'error');
  }
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('show');
  editingId = null;
}

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('edit-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

document.querySelectorAll('.status-option').forEach(el => {
  el.addEventListener('click', () => {
    currentStatus = el.dataset.status;
    document.querySelectorAll('.status-option').forEach(e => {
      const s = e.dataset.status;
      e.className = 'status-option' + (s === currentStatus ? ' selected-' + s : '');
    });
  });
});

document.getElementById('edit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!editingId) return;
  const data = {
    date: document.getElementById('edit-date').value,
    time: document.getElementById('edit-time').value,
    title: document.getElementById('edit-title').value.trim(),
    note: document.getElementById('edit-note').value.trim(),
    status: currentStatus
  };
  try {
    await api('PUT', '/api/activities/' + editingId, data);
    showToast('✅ Aktivitas diperbarui!');
    closeModal();
    loadToday();
  } catch (e) {
    showToast('Gagal menyimpan: ' + e.message, 'error');
  }
});

document.getElementById('modal-delete-btn').addEventListener('click', async () => {
  if (!editingId) return;
  if (!confirm('Yakin ingin menghapus aktivitas ini?')) return;
  try {
    await api('DELETE', '/api/activities/' + editingId);
    showToast('🗑 Aktivitas dihapus');
    closeModal();
    loadToday();
  } catch (e) {
    showToast('Gagal menghapus: ' + e.message, 'error');
  }
});

// === INIT ===
document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('add-date').value = d.toISOString().slice(0,10);
  document.getElementById('add-time').value = d.toTimeString().slice(0,5);
  loadToday();
});
</script>
</body>
</html>
