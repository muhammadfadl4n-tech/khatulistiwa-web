<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Agen LPG Kalbar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --bg:#080e1a;
  --card:#111b2e;
  --card-2:#0d1727;
  --line:rgba(255,255,255,.05);
  --text:#e8edf5;
  --muted:#7a8ba8;
  --blue:#3b82f6;
  --blue-2:#60a5fa;
  --green:#10b981;
  --green-2:#34d399;
  --orange:#ea580c;
  --orange-2:#fb923c;
  --soft:rgba(59,130,246,.12);
  --shadow:0 24px 60px rgba(0,0,0,.34);
}
html,body{height:100%;margin:0}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  font-size:14px;
  background:
    radial-gradient(circle at top left,rgba(59,130,246,.13),transparent 34rem),
    radial-gradient(circle at top right,rgba(16,185,129,.10),transparent 30rem),
    var(--bg);
  color:var(--text);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button,input,select{font:inherit}
button{cursor:pointer}
.shell{height:100vh;display:flex;flex-direction:column}
.hero{
  background:rgba(8,14,26,.88);
  border-bottom:1px solid var(--line);
  color:var(--text);
  padding:18px 22px 20px;
}
.hero-inner{max-width:1440px;margin:0 auto}
.nav{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.brand{font-weight:800;letter-spacing:.2px;margin-right:auto}
.nav a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:650}
.nav a:hover,.nav a.active{color:var(--blue-2)}
.title-row{display:grid;grid-template-columns:1fr auto;gap:22px;align-items:end}
h1{font-size:clamp(28px,4vw,46px);line-height:1.05;margin:0 0 8px;font-weight:850;letter-spacing:0}
.lead{max-width:760px;margin:0;color:var(--muted);font-size:15px}
.stats{display:grid;grid-template-columns:repeat(3,150px);gap:10px}
.stat-card{
  min-height:88px;
  padding:14px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
  border-radius:12px;
  backdrop-filter:blur(12px);
}
.stat-card .label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:750;letter-spacing:.6px}
.stat-card .value{font-size:27px;font-weight:850;margin-top:6px}
.toolbar{
  max-width:1440px;
  margin:0 auto;
  padding:16px 22px;
  display:grid;
  grid-template-columns:minmax(320px,1fr) minmax(190px,240px) minmax(190px,240px) auto;
  align-items:center;
  gap:12px;
  background:transparent;
}
.control{position:relative}
.control input,.control select{
  width:100%;
  height:46px;
  border:1px solid rgba(148,163,184,.18);
  border-radius:8px;
  background:#0b1424;
  color:var(--text);
  padding:0 14px;
  outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.control input{padding-left:44px}
.control select{
  appearance:none;
  padding-right:40px;
  color-scheme:dark;
}
.control.select-control::after{
  content:"";
  position:absolute;
  right:15px;
  top:50%;
  width:8px;
  height:8px;
  border-right:2px solid var(--muted);
  border-bottom:2px solid var(--muted);
  transform:translateY(-65%) rotate(45deg);
  pointer-events:none;
}
.control input:focus,.control select:focus{border-color:rgba(96,165,250,.72);box-shadow:0 0 0 3px rgba(59,130,246,.18)}
.control input::placeholder{color:rgba(148,163,184,.82)}
.control option{background:#0b1424;color:var(--text)}
.control select,.agent-list,.dialog{scrollbar-width:thin;scrollbar-color:rgba(148,163,184,.42) rgba(15,23,42,.65)}
.control select::-webkit-scrollbar,.agent-list::-webkit-scrollbar,.dialog::-webkit-scrollbar{width:10px}
.control select::-webkit-scrollbar-track,.agent-list::-webkit-scrollbar-track,.dialog::-webkit-scrollbar-track{background:rgba(15,23,42,.65)}
.control select::-webkit-scrollbar-thumb,.agent-list::-webkit-scrollbar-thumb,.dialog::-webkit-scrollbar-thumb{background:rgba(148,163,184,.42);border-radius:999px;border:2px solid rgba(15,23,42,.65)}
.search-icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:var(--blue-2);
  width:17px;
  height:17px;
  pointer-events:none;
}
.filter-counter{
  min-width:138px;
  height:46px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:7px;
  padding:0 14px;
  border:1px solid rgba(148,163,184,.14);
  border-radius:8px;
  background:rgba(13,23,39,.72);
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}
.filter-counter strong{color:var(--text);font-size:15px}
.workspace{
  flex:1;
  width:100%;
  max-width:1440px;
  margin:0 auto;
  padding:0 22px 22px;
  display:grid;
  grid-template-columns:400px minmax(0,1fr);
  gap:14px;
  min-height:0;
}
.sidebar,.map-panel{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  min-height:0;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.sidebar{display:flex;flex-direction:column;min-height:0}
.list-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line)}
.list-head h2{font-size:14px;margin:0;font-weight:800}
.list-count{font-size:12px;color:var(--muted)}
.agent-list{overflow:auto;padding:10px;display:grid;gap:9px;flex:1;min-height:0}
.agent-card{
  position:relative;
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  border:1px solid var(--line);
  background:var(--card-2);
  border-radius:10px;
  padding:12px 14px 12px 18px;
  text-align:left;
  transition:.15s ease;
  cursor:pointer;
}
.agent-card::before{
  content:"";
  position:absolute;
  left:0;
  top:4px;
  bottom:4px;
  width:4px;
  border-radius:2px;
  background:var(--region-color,#64748b);
}
.agent-card:hover{border-color:rgba(96,165,250,.5);box-shadow:0 8px 20px rgba(0,0,0,.2);transform:translateY(-1px)}
.agent-card .avatar{
  width:44px;height:44px;border-radius:10px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;flex-shrink:0;
}
.agent-card .info{flex:1;min-width:0}
.agent-name{
  font-size:14px;font-weight:700;margin:0 0 2px;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.agent-meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 8px;margin-bottom:5px}
.agent-meta span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:45%}
.allocation-badge{
  display:inline-flex;
  align-items:center;
  width:max-content;
  padding:2px 8px;
  border-radius:5px;
  background:rgba(16,185,129,.1);
  border:1px solid rgba(52,211,153,.15);
  color:var(--green-2);
  font-size:11px;
  font-weight:700;
}
.map-panel{position:relative;min-height:0}
#map{height:100%;min-height:400px;background:#0b1220;}
.leaflet-tooltip.agent-tip{border:0;border-radius:6px;box-shadow:0 12px 24px rgba(15,23,42,.18);font-weight:800}
.skeleton{padding:10px;display:grid;gap:9px}
.sk-card{height:92px;border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.08),rgba(255,255,255,.04));background-size:200% 100%;animation:shimmer 1.2s infinite}
@keyframes shimmer{to{background-position:-200% 0}}
.empty{padding:44px 22px;text-align:center;color:var(--muted)}
.empty strong{display:block;color:var(--text);font-size:16px;margin-bottom:5px}
.modal{
  position:fixed;inset:0;z-index:1200;
  display:none;align-items:center;justify-content:center;
  background:rgba(3,7,18,.72);
  padding:20px;
}
.modal.open{display:flex}
.dialog{
  width:min(920px,100%);
  max-height:92vh;
  overflow:auto;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:var(--shadow);
}
.dialog-head{
  display:flex;align-items:flex-start;gap:14px;
  padding:18px 20px;
  color:var(--text);
  background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(16,185,129,.10));
  border-bottom:1px solid var(--line);
}
.dialog-title{flex:1}
.dialog-title h3{margin:0 0 5px;font-size:21px}
.dialog-title p{margin:0;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.region-badge{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:3px 9px;
  border-radius:999px;
  background:color-mix(in srgb,var(--region-color,#64748b) 18%,transparent);
  border:1px solid color-mix(in srgb,var(--region-color,#64748b) 46%,transparent);
  color:#fff;
  font-size:12px;
  font-weight:850;
}
.close{
  width:36px;height:36px;border:1px solid var(--line);
  border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);font-size:22px;line-height:1;
}
.dialog-body{padding:18px 20px 22px}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.field{border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--card-2)}
.field .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800;margin-bottom:4px}
.field .v{font-size:14px;word-break:break-word}
.wide{grid-column:1/-1}
.allocation-panel{margin-top:14px;border:1px solid var(--line);border-radius:8px;padding:14px;background:linear-gradient(135deg,rgba(16,185,129,.10),rgba(59,130,246,.08))}
.allocation-panel .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800;margin-bottom:5px}
.allocation-panel .v{font-size:24px;font-weight:850;color:var(--green-2)}
/* ── Edit Mode ── */
.edit-actions{display:flex;gap:8px;align-items:center}
.btn-edit,.btn-save,.btn-cancel{
  height:36px;border-radius:8px;border:none;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:6px;padding:0 14px;cursor:pointer;transition:.15s ease;
}
.btn-edit{background:rgba(59,130,246,.18);color:var(--blue-2)}
.btn-edit:hover{background:rgba(59,130,246,.32)}
.btn-save{background:rgba(16,185,129,.2);color:var(--green-2)}
.btn-save:hover{background:rgba(16,185,129,.35)}
.btn-cancel{background:rgba(148,163,184,.15);color:var(--muted)}
.btn-cancel:hover{background:rgba(148,163,184,.28)}
.edit-field input,.edit-field textarea,.edit-field select{
  width:100%;padding:8px 10px;border:1px solid rgba(148,163,184,.25);
  border-radius:6px;background:#0b1424;color:var(--text);font-size:13px;
  font-family:inherit;outline:none;
}
.edit-field input:focus,.edit-field textarea:focus,.edit-field select:focus{border-color:var(--blue-2);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.edit-field textarea{resize:vertical;min-height:36px}
.edit-field select{appearance:none;cursor:pointer;padding-right:28px;color-scheme:dark}
.view-field{display:none}
.edit-field{display:block}
.field.editing{padding:6px}
.field.editing .k{margin-bottom:2px}
.field .hint{font-size:10px;color:var(--muted);margin-top:2px}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;
  z-index:9999;animation:toastIn .3s ease;
}
.toast.success{background:rgba(16,185,129,.9);color:#fff}
.toast.error{background:rgba(239,68,68,.9);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:900px){
  .hero{padding:12px 12px 14px}
  .nav{gap:8px;overflow-x:auto;margin-bottom:10px;padding-bottom:0}
  .nav a{font-size:12px;white-space:nowrap}
  .brand{font-size:14px}
  .title-row{grid-template-columns:1fr;align-items:start;gap:10px}
  h1{font-size:clamp(28px,4vw,46px);margin-bottom:4px}
  .lead{font-size:12px!important}
  .stats{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
  .stat-card{min-height:60px;padding:8px 10px}
  .stat-card .label{font-size:9px}
  .stat-card .value{font-size:18px;margin-top:4px}
  .toolbar{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:10px 12px;
  }
  .toolbar .control{flex:1 1 100%;min-width:0}
  .toolbar .control select{min-width:0}
  .toolbar .control.select-control{flex:1 1 calc(50% - 4px)}
  .toolbar .filter-counter{
    flex:1 1 100%;justify-content:center;
    height:38px;
  }
  .control input,.control select{height:40px;font-size:13px}
  .control input{padding-left:38px}
  .control select{padding:0 32px 0 10px}
  .search-icon{width:15px;height:15px;left:12px}
  .workspace{
    padding:0 10px 10px;
    grid-template-columns:1fr;
    grid-template-rows:30vh minmax(0,1fr);
    gap:10px;
  }
  .sidebar{order:1;max-height:none;min-height:0}
  .map-panel{order:2}
  #map{min-height:30vh;height:30vh}
  .detail-grid{grid-template-columns:1fr}
  .agent-list{padding:6px;gap:6px;max-height:40vh}
  .agent-card{gap:10px;padding:10px 12px 10px 16px}
  .agent-card .avatar{width:36px;height:36px;font-size:12px;border-radius:8px}
  .agent-name{font-size:13px}
  .agent-meta{font-size:11px;gap:2px 6px;margin-bottom:3px}
  .allocation-badge{margin-top:0;font-size:10px;padding:2px 6px}
  .agent-list{padding:6px;gap:6px;max-height:40vh}
}
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <div class="hero-inner">
      <nav class="nav">
        <div class="brand">Portal 5555</div>
        <a href="/">🏠 Beranda</a>
        <a href="/lpg">⛽ LPG</a>
        <a class="active" href="/agen">🏢 Agen</a>
        <a href="/pangkalan">🗺️ Pangkalan</a>
      </nav>
      <div class="title-row">
        <div>
          <h1>Profile Agen LPG Kalbar</h1>
          <p class="lead">Direktori agen lengkap dengan lokasi gudang, kontak pengusaha dan PIC, dukungan operasional, serta alokasi tabung.</p>
        </div>
        <section class="stats" aria-label="Statistik agen">
          <div class="stat-card"><div class="label">Total Agen</div><div class="value" id="statTotal">-</div></div>
          <div class="stat-card"><div class="label">Kab/Kota</div><div class="value" id="statKab">-</div></div>
          <div class="stat-card"><div class="label">Alokasi <span id="bulanLabel"></span></div><div class="value" id="statTw3">-</div></div>
        </section>
      </div>
    </div>
  </header>

  <section class="toolbar" aria-label="Filter agen">
    <label class="control">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Cari nama agen, sold to, wilayah, PIC...">
    </label>
    <label class="control select-control">
      <select id="wilayahSelect"><option value="">Semua wilayah</option></select>
    </label>
    <label class="control select-control">
      <select id="rayonSelect"><option value="">Semua rayon</option></select>
    </label>
    <div class="filter-counter" aria-live="polite"><strong id="filterCount">-</strong><span>agen tampil</span></div>
  </section>

  <main class="workspace">
    <aside class="sidebar">
      <div class="list-head">
        <h2>Daftar Agen</h2>
        <span class="list-count" id="listCount">Memuat</span>
      </div>
      <div class="agent-list" id="agentList">
        <div class="skeleton"><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div></div>
      </div>
    </aside>
    <section class="map-panel" aria-label="Peta agen">
      <div id="map"></div>
    </section>
  </main>
</div>

<div class="modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="dialog">
    <div class="dialog-head">
      <div class="avatar" id="modalAvatar">AG</div>
      <div class="dialog-title">
        <h3 id="modalTitle">Detail Agen</h3>
        <p id="modalSubtitle"></p>
      </div>
      <div class="edit-actions">
        <button class="btn-edit" id="btnEdit" onclick="startEdit()" aria-label="Edit">✏️ Edit</button>
        <button class="close" id="closeModal" aria-label="Tutup">&times;</button>
      </div>
    </div>
    <div class="dialog-body" id="modalBody"></div>
  </div>
</div>

<script>
const colors=["#3b82f6","#10b981","#ea580c","#60a5fa","#34d399","#fb923c"];
const wilayahColors={
  "Kota Pontianak":"#3b82f6",
  "Kota Singkawang":"#8b5cf6",
  "Kab Bengkayang":"#10b981",
  "Kab Kubu Raya":"#f59e0b",
  "Kab Landak":"#ef4444",
  "Kab Mempawah":"#ec4899",
  "Kab Sambas":"#06b6d4",
  "Kab Sanggau":"#f97316",
  "Kab Sekadau":"#14b8a6",
  "Kab Sintang":"#a855f7",
  "Kab Ketapang":"#22c55e",
  "Kab Kapuas Hulu":"#eab308",
  "Kab Kayong Utara":"#d946ef",
  "Kab Melawi":"#0ea5e9"
};
const state={agents:[],map:null,markers:[]};
const el=id=>document.getElementById(id);
const fmt=n=>(n||0).toLocaleString("id-ID");
const esc=v=>String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
const initials=name=>name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();
const avatarColor=name=>colors[Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0))%colors.length];
const wilayahColor=wilayah=>wilayahColors[String(wilayah||"").trim()]||"#64748b";

function queryString(){
  const p=new URLSearchParams();
  if(el("searchInput").value.trim()) p.set("q",el("searchInput").value.trim());
  if(el("wilayahSelect").value) p.set("wilayah",el("wilayahSelect").value);
  if(el("rayonSelect").value) p.set("rayon",el("rayonSelect").value);
  return p.toString();
}

async function fetchJson(url){
  const res=await fetch(url,{cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}

async function init(){
  await Promise.all([loadStats(),loadOptions()]);
  await loadAgents();
  bindEvents();
}

function bindEvents(){
  let timer=null;
  el("searchInput").addEventListener("input",()=>{
    clearTimeout(timer);
    timer=setTimeout(loadAgents,180);
  });
  el("wilayahSelect").addEventListener("change",loadAgents);
  el("rayonSelect").addEventListener("change",loadAgents);
  el("closeModal").addEventListener("click",closeModal);
  el("detailModal").addEventListener("click",e=>{if(e.target.id==="detailModal")closeModal()});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
}

async function loadStats(){
  const s=await fetchJson("/api/agen/stats");
  el("statTotal").textContent=fmt(s.total);
  el("statKab").textContent=fmt(s.kabupaten_count);
  el("statTw3").textContent=fmt(s.tw3_count);
  // Set bulan berjalan
  const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const d=new Date();
  el("bulanLabel").textContent=months[d.getMonth()]+" "+d.getFullYear();
}

async function loadOptions(){
  const data=await fetchJson("/api/agen");
  fillSelect("wilayahSelect",[...new Set(data.map(a=>a.wilayah).filter(Boolean))]);
  fillSelect("rayonSelect",[...new Set(data.map(a=>a.rayon_sbm).filter(Boolean))]);
}

function fillSelect(id,values){
  const first=el(id).options[0].outerHTML;
  el(id).innerHTML=first+values.sort().map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join("");
}

async function loadAgents(){
  el("listCount").textContent="Memuat";
  el("filterCount").textContent="-";
  el("agentList").innerHTML='<div class="skeleton"><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div></div>';
  try{
    const qs=queryString();
    state.agents=await fetchJson("/api/agen"+(qs?"?"+qs:""));
    renderList();
    renderMap();
  }catch(err){
    el("listCount").textContent="Gagal";
    el("agentList").innerHTML=`<div class="empty"><strong>Gagal memuat data</strong>${esc(err.message)}</div>`;
  }
}

function renderList(){
  el("listCount").textContent=fmt(state.agents.length)+" agen";
  el("filterCount").textContent=fmt(state.agents.length);
  if(!state.agents.length){
    el("agentList").innerHTML='<div class="empty"><strong>Tidak ada agen</strong>Ubah kata kunci atau filter wilayah.</div>';
    return;
  }
  el("agentList").innerHTML=state.agents.map(a=>{
    const name=a.nama_agen || "Tanpa Nama";
    const regionColor=wilayahColor(a.wilayah);
    const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    const bulan=months[new Date().getMonth()];
    return `<button class="agent-card" type="button" data-name="${esc(name)}" style="--region-color:${regionColor}">
      <div class="avatar" style="background:${avatarColor(name)}">${esc(initials(name))}</div>
      <div class="info">
        <p class="agent-name">${esc(name)}</p>
        <div class="agent-meta"><span>${esc(a.wilayah || "-")}</span><span>${esc(a.rayon_sbm || "-")}</span></div>
        <div class="agent-meta" style="margin-top:3px;font-size:11px;color:var(--muted);">
          ${a.afiliasi ? `<span style="color:var(--blue-2);font-weight:700;">▫ ${esc(a.afiliasi)}</span>` : ""}
          ${a.pengusaha ? `<span>👤 ${esc(a.pengusaha)}</span>` : ""}
        </div>
        <span class="allocation-badge">${bulan} ${fmt(Number(a.alokasi)||0)}</span>
      </div>
    </button>`;
  }).join("");
  document.querySelectorAll(".agent-card").forEach(card=>{
    card.addEventListener("click",()=>openDetail(card.dataset.name));
  });
}

function ensureMap(){
  if(state.map) return;
  state.map=L.map("map",{scrollWheelZoom:true}).setView([-0.05,109.34],9);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19,
    attribution:"&copy; OpenStreetMap"
  }).addTo(state.map);
}

function renderMap(){
  ensureMap();
  state.markers.forEach(m=>m.remove());
  state.markers=[];
  const bounds=[];
  state.agents.forEach(a=>{
    const lat=Number(a.latitude),lng=Number(a.longitude);
    if(!Number.isFinite(lat)||!Number.isFinite(lng)) return;
    const name=a.nama_agen || "Tanpa Nama";
    const regionColor=wilayahColor(a.wilayah);
    const marker=L.circleMarker([lat,lng],{
      radius:7,fillColor:regionColor,color:"#fff",weight:2,fillOpacity:.9
    }).addTo(state.map)
      .bindTooltip(esc(name),{className:"agent-tip"})
      .on("click",()=>openDetail(name));
    state.markers.push(marker);
    bounds.push([lat,lng]);
  });
  if(bounds.length) state.map.fitBounds(bounds,{padding:[45,45],maxZoom:11});
  setTimeout(()=>state.map.invalidateSize(),80);
}

async function openDetail(name){
  state.currentAgent=null;
  const data=await fetchJson("/api/agen/detail?nama="+encodeURIComponent(name));
  state.currentAgent=data;
  const agentName=data.nama_agen || "Tanpa Nama";
  const color=avatarColor(agentName);
  const regionColor=wilayahColor(data.wilayah);
  el("modalAvatar").style.background=color;
  el("modalAvatar").textContent=initials(agentName);
  el("modalTitle").textContent=agentName;
  el("modalSubtitle").style.setProperty("--region-color",regionColor);
  el("modalSubtitle").innerHTML=`<span class="region-badge">${esc(data.wilayah || "-")}</span><span>${esc(data.rayon_sbm || "-")} | Sold To ${esc(data.sold_to || "-")}</span>`;
  el("modalBody").innerHTML=detailHtml(data);
  el("btnEdit").style.display="inline-flex";
  el("btnEdit").textContent="✏️ Edit";
  el("btnEdit").className="btn-edit";
  el("btnEdit").onclick=startEdit;
  el("detailModal").classList.add("open");
}

function closeModal(){el("detailModal").classList.remove("open")}

function field(k,v,wide=false){
  const value=(v===null||v===undefined||v==="")?"-":v;
  return `<div class="field ${wide?"wide":""}"><div class="k">${esc(k)}</div><div class="v">${esc(value)}</div></div>`;
}

function detailHtml(a){
  const hasCoord=Number.isFinite(Number(a.latitude))&&Number.isFinite(Number(a.longitude));
  const coord=hasCoord?`${a.latitude}, ${a.longitude}`:"Belum ada koordinat";
  const alokasi=Number(a.alokasi)||0;
  const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const bulan=months[new Date().getMonth()];
  const keys=[
    ["No",a.no],["Sold To",a.sold_to],["Wilayah",a.wilayah],["Rayon SBM",a.rayon_sbm],
    ["Alamat Kantor",a.alamat_kantor,true],["Desa/Kel",a.desa_kel],["Kecamatan",a.kecamatan],
    ["Koordinat",coord,true],["Pengusaha",a.pengusaha],["No Pengusaha",a.no_pengusaha],
    ["PIC",a.pic],["No PIC",a.no_pic],["Armada Truk",a.kepemilikan_armada_truk],
    ["Armada Pick Up",a.kepemilikan_armada_pick_up],["Afiliasi",a.afiliasi],
    ["Alamat Gudang",a.alamat_gudang,true],["Support Pertamina",a.support_pertamina,true],
    ["Background",a.background,true],["LO Harian",a.lo_harian]
  ];
  return `<div class="detail-grid">${keys.map(x=>field(x[0],x[1],x[2])).join("")}</div>
    <div class="allocation-panel">
      <div class="k">Alokasi ${bulan}</div>
      <div class="v">${fmt(alokasi)} tabung</div>
    </div>`;
}

/* ── Edit Mode ── */
function editHtml(a){
  const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const bulan=months[new Date().getMonth()];
  const alokasi=Number(a.alokasi)||0;
  const fields=[
    ["nama_agen","Nama Agen",a.nama_agen,false],
    ["sold_to","Sold To",a.sold_to,false],
    ["latitude","Latitude",a.latitude||"",false],
    ["longitude","Longitude",a.longitude||"",false],
    ["alamat_kantor","Alamat Kantor",a.alamat_kantor,true],
    ["desa_kel","Desa/Kel",a.desa_kel,false],
    ["kecamatan","Kecamatan",a.kecamatan,false],
    ["alamat_gudang","Alamat Gudang",a.alamat_gudang,true],
    ["pengusaha","Pengusaha",a.pengusaha,false],
    ["no_pengusaha","No.Pengusaha",a.no_pengusaha,false],
    ["pic","PIC",a.pic,false],
    ["no_pic","No.PIC",a.no_pic,false],
    ["kepemilikan_armada_truk","Armada Truk",a.kepemilikan_armada_truk,false],
    ["kepemilikan_armada_pick_up","Armada Pick Up",a.kepemilikan_armada_pick_up,false],
    ["afiliasi","Afiliasi",a.afiliasi,false],
    ["support_pertamina","Support Pertamina",a.support_pertamina,false],
    ["background","Background",a.background,true],
    ["lo_harian","LO Harian",a.lo_harian,false],
  ];
  return `<div class="detail-grid">${fields.map(f=>{
    const [key,label,val,wide]=f;
    const isLong=["alamat_kantor","alamat_gudang","background"].includes(key);
    return `<div class="field editing ${wide?"wide":""}">
      <div class="k">${esc(label)}</div>
      <div class="edit-field">${
        isLong
          ? `<textarea id="ef_${key}" rows="2">${esc(String(val??""))}</textarea>`
          : `<input id="ef_${key}" type="text" value="${esc(String(val??""))}" ${key==="sold_to"?"readonly style='opacity:.6'":""}>`
      }</div>
    </div>`;
  }).join("")}</div>
    <div class="allocation-panel">
      <div class="k">Alokasi ${bulan}</div>
      <div class="v">${fmt(alokasi)} tabung</div>
    </div>`;
}

function startEdit(){
  const a=state.currentAgent;
  if(!a) return;
  el("modalBody").innerHTML=editHtml(a);
  el("btnEdit").textContent="💾 Simpan";
  el("btnEdit").className="btn-save";
  el("btnEdit").onclick=saveEdit;
  const cancelBtn=document.createElement("button");
  cancelBtn.className="btn-cancel";
  cancelBtn.textContent="✕ Batal";
  cancelBtn.id="btnCancel";
  cancelBtn.onclick=cancelEdit;
  el("btnEdit").parentElement.insertBefore(cancelBtn,el("btnEdit"));
}

function cancelEdit(){
  const cancel=document.getElementById("btnCancel");
  if(cancel) cancel.remove();
  const a=state.currentAgent;
  if(!a){closeModal();return;}
  el("modalBody").innerHTML=detailHtml(a);
  el("btnEdit").textContent="✏️ Edit";
  el("btnEdit").className="btn-edit";
  el("btnEdit").onclick=startEdit;
}

async function saveEdit(){
  const a=state.currentAgent;
  if(!a) return;
  const payload={sold_to:a.sold_to};
  const fields=["nama_agen","latitude","longitude","alamat_kantor","desa_kel","kecamatan",
    "pengusaha","no_pengusaha","pic","no_pic","kepemilikan_armada_truk","kepemilikan_armada_pick_up",
    "afiliasi","support_pertamina","background","alamat_gudang","lo_harian"];
  let changed=false;
  for(const key of fields){
    const inp=document.getElementById("ef_"+key);
    if(inp){
      const newVal=inp.value.trim();
      if(newVal!==(a[key]||"")){
        payload[key]=newVal;
        changed=true;
      }
    }
  }
  if(!changed){
    showToast("Tidak ada perubahan","error");
    return;
  }
  try{
    const res=await fetch("/api/agen/update",{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload),
    });
    const result=await res.json();
    if(result.success){
      // Refresh data
      const fresh=await fetchJson("/api/agen/detail?nama="+encodeURIComponent(a.nama_agen));
      state.currentAgent=fresh;
      cancelEdit();
      showToast(`✅ ${result.message}`,"success");
      // Refresh list
      loadAgents();
    }else{
      showToast("❌ "+(result.error||"Gagal menyimpan"),"error");
    }
  }catch(e){
    showToast("❌ Gagal: "+e.message,"error");
  }
}

function showToast(msg,type){
  const old=document.querySelector(".toast");
  if(old) old.remove();
  const t=document.createElement("div");
  t.className="toast "+type;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

window.addEventListener("load",()=>init().catch(err=>{
  el("agentList").innerHTML=`<div class="empty"><strong>Gagal memuat halaman</strong>${esc(err.message)}</div>`;
}));
</script>
</body>
</html>
