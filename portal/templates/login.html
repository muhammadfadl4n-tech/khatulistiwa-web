<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Portal 5555</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080e1a;
            --card: #111b2e;
            --card-2: #0d1727;
            --border: rgba(255,255,255,.05);
            --text: #e8edf5;
            --muted: #7a8ba8;
            --blue: #3b82f6;
            --blue-2: #60a5fa;
            --green: #10b981;
            --red: #ef4444;
        }
        body {
            font-family: Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,.14), transparent 34rem),
                radial-gradient(circle at bottom right, rgba(16,185,129,.10), transparent 30rem),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            padding: 1.5rem;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--blue) 0%, #2563eb 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
        }
        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -.3px;
        }
        .logo p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }
        .error-message {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,.2);
        }
        .form-group input::placeholder {
            color: #475569;
        }
        .btn-login {
            width: 100%;
            padding: 11px 14px;
            background: linear-gradient(135deg, var(--blue) 0%, #2563eb 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            margin-top: 8px;
        }
        .btn-login:hover {
            opacity: .9;
        }
        .btn-login:active {
            transform: scale(.98);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--muted);
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-loading .btn-text { display: none; }
        .btn-loading .spinner { display: inline-block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Portal 5555</h1>
            <p>Masuk untuk mengakses dashboard LPG</p>
        </div>

        <div id="error-container"><!--ERROR_PLACEHOLDER--></div>

        <form method="post" action="/login" id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login" id="btn-login">
                <span class="btn-text">Masuk</span>
                <span class="spinner"></span>
            </button>
            <div class="footer">Portal LPG &mdash; Pertamina SBM Kalbar</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function() {
            document.getElementById('btn-login').classList.add('btn-loading');
        });
    </script>
</body>
</html>
